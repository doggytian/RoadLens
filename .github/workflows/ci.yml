name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Byte-compile all sources
        run: python -m compileall -q server scripts

      - name: Run tests
        run: python -m pytest -q

      - name: Smoke test (Flask test client hits /api/data/state)
        run: |
          python - <<'PY'
          from server.app import create_app

          app = create_app()
          client = app.test_client()
          resp = client.get("/api/data/state", headers={"X-User-Id": "ci_bot"})
          assert resp.status_code == 200, f"unexpected status: {resp.status_code}"
          data = resp.get_json()
          assert data["user_id"] == "ci_bot", data
          assert len(data["qc_checks"]) == 8, data
          print("smoke test OK:", data["qc_checks"])
          PY
